version: "3.8"

#we want to set up redis and postgres as services for our application
services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
  postgres:
    image: "postgres:alpine"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: studyflash
      POSTGRES_PASSWORD: studyFlash123!
      POSTGRES_DB: studyflash

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

    volumes:
      - ./data/tickets:/data/tickets:ro

  init_db:
    build: ./worker
    depends_on:
      - postgres
    command: >
      sh -c "./wait-for-it.sh postgres:5432 -- python init_db.py"

  live_ingest_worker:
    build: ./worker
    depends_on:
      - postgres
      - redis
      - init_db
    command: >
      sh -c "./wait-for-it.sh postgres:5432 -- python live_ingest_worker.py"
    volumes:
      - ./data/tickets:/data/tickets:ro

  enrich_worker:
    build: ./worker
    depends_on:
      - postgres
      - redis
      - init_db
    command: >
      sh -c "./wait-for-it.sh postgres:5432 -- python enrich_worker.py"
    volumes:
    - ./data/tickets:/data/tickets:ro

  ui:
    build: ./ui
    ports:
      - "3000:80"
    depends_on:
      - api